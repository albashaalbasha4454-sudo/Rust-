<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مطابخ الشرق - نظام الإدارة</title>
    <link rel="icon" type="image/jpeg" href="./imges/logo.jpg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#fffbeb',
                100: '#fef3c7',
                200: '#fde68a',
                300: '#fcd34d',
                400: '#fbbf24',
                500: '#f59e0b',
                600: '#d97706',
                700: '#b45309',
                800: '#92400e',
                900: '#78350f',
                DEFAULT: '#f59e0b'
              },
              dark: {
                50: '#f6f6f6',
                100: '#e7e7e7',
                200: '#d1d1d1',
                300: '#b0b0b0',
                400: '#888888',
                500: '#6d6d6d',
                600: '#5d5d5d',
                700: '#4f4f4f',
                800: '#454545',
                900: '#3d3d3d',
                950: '#1a1a1a',
                DEFAULT: '#1a1a1a'
              },
              indigo: {
                50: '#fffbeb',
                100: '#fef3c7',
                200: '#fde68a',
                300: '#fcd34d',
                400: '#fbbf24',
                500: '#f59e0b',
                600: '#d97706',
                700: '#b45309',
                800: '#92400e',
                900: '#78350f'
              },
              slate: {
                50: '#f6f6f6',
                100: '#e7e7e7',
                200: '#d1d1d1',
                300: '#b0b0b0',
                400: '#888888',
                500: '#6d6d6d',
                600: '#5d5d5d',
                700: '#4f4f4f',
                800: '#454545',
                900: '#3d3d3d',
                950: '#1a1a1a'
              }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
      html {
        scroll-behavior: smooth;
        direction: rtl;
      }
      body {
        font-family: 'Cairo', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-tap-highlight-color: transparent;
        margin: 0;
        min-width: 320px;
        overflow-x: hidden;
      }
      *, *::before, *::after {
        box-sizing: border-box;
      }
      img, svg, video, canvas {
        max-width: 100%;
      }
      .material-symbols-outlined {
        font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24;
        line-height: 1;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #d1d1d1;
        border-radius: 999px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      @media print {
        body * {
          visibility: hidden;
        }
        #print-area, #print-area * {
          visibility: visible;
        }
        #print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
        }
      }
    </style>
  </head>
  <body class="bg-slate-100">
    <div id="root"></div>
    <script>
      window.addEventListener('load', function () {
        var openProductSearch = function () {
          var buttons = Array.from(document.querySelectorAll('button'));
          var filterButton = buttons.find(function (button) {
            return button.textContent && button.textContent.includes('تصفية') && button.textContent.includes('expand_more');
          });
          var searchInput = Array.from(document.querySelectorAll('input')).find(function (input) {
            return input.placeholder && input.placeholder.includes('الاسم');
          });
          if (filterButton && !searchInput) filterButton.click();
        };
        setInterval(openProductSearch, 1200);
      });
    </script>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
